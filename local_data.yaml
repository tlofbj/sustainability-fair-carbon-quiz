bills:
  # Last updated: 2025. Check capitol.hawaii.gov for the current session's active bills.
  # To submit testimony: visit capitol.hawaii.gov → find bill → click "Submit Testimony"

  - number: "SB 1396"
    title: "Green Fee Climate Law"
    url: "https://www.capitol.hawaii.gov/session/measure_indiv.aspx?billtype=SB&billnumber=1396&year=2025"
    description: "Establishes a climate impact fee on tourism accommodations, generating ~$100M/year for environmental stewardship and climate resilience. Signed into law May 2025."
    icon: "💚"

  - number: "SB 1024"
    title: "Zero Emission Transportation"
    url: "https://www.capitol.hawaii.gov/"
    description: "Sets a statewide goal to achieve zero emissions across all transportation modes — ground, air, and sea — by 2045."
    icon: "🚌"

  - number: "HB 2771"
    title: "Hawaii Healthy Food Incentive"
    url: "https://www.capitol.hawaii.gov/"
    description: "Funds a dollar-for-dollar match for SNAP recipients purchasing locally grown fruits and vegetables, strengthening Hawaii's food systems."
    icon: "🌱"
